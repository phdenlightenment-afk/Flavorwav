<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlavorWav</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --cyan: #00d4ff;
  --cyan2: #0af;
  --blue: #0062ff;
  --dark: #000005;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow-x: hidden; }
body {
  background: var(--dark);
  font-family: 'Rajdhani', sans-serif;
  color: #e8f4ff;
}

/* ── HERO ── */
#hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 40px 24px 60px;
}

/* ── CANVAS (fullscreen animated bg) ── */
#bg-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* ── LOGO ── */
.logo-wrap {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.logo-img {
  width: clamp(200px, 45vw, 340px);
  height: auto;
  display: block;
  mix-blend-mode: screen;
  opacity: 0;
  animation: logoIn 1.4s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
  position: relative;
  z-index: 2;
}

/* ── TEXT CONTENT ── */
.hero-text {
  position: relative;
  z-index: 10;
  text-align: center;
  margin-top: -12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 5px 16px;
  border: 1px solid rgba(0,212,255,0.25);
  border-radius: 50px;
  background: rgba(0,212,255,0.06);
  backdrop-filter: blur(10px);
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  letter-spacing: 3px;
  color: var(--cyan);
  margin-bottom: 16px;
  opacity: 0;
  animation: slideUp 0.8s ease 1s forwards;
}
.badge-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
  animation: blink 1.6s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.hero-headline {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: clamp(22px, 5.5vw, 62px);
  line-height: 1.1;
  margin-bottom: 14px;
  opacity: 0;
  animation: slideUp 0.9s ease 1.15s forwards;
}
.hl1 {
  display: block;
  color: #ffffff;
  text-shadow: 0 0 40px rgba(0,212,255,0.4);
}
.hl2 {
  display: block;
  background: linear-gradient(100deg, #00d4ff 0%, #0af 40%, #0062ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px rgba(0,212,255,0.5));
}

.hero-sub {
  font-size: clamp(13px, 2vw, 17px);
  font-weight: 400;
  color: rgba(200,230,255,0.6);
  max-width: 400px;
  line-height: 1.7;
  margin-bottom: 28px;
  opacity: 0;
  animation: slideUp 0.8s ease 1.3s forwards;
}

/* ── BUTTONS ── */
.hero-ctas {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  opacity: 0;
  animation: slideUp 0.8s ease 1.45s forwards;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 30px;
  border-radius: 50px;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  transform: translateX(-100%);
  transition: transform 0.5s ease;
}
.btn:hover::after { transform: translateX(100%); }
.btn-primary {
  background: linear-gradient(135deg, #00d4ff, #0062ff);
  color: #fff;
  box-shadow: 0 0 30px rgba(0,180,255,0.4), 0 6px 20px rgba(0,0,0,0.5);
}
.btn-primary:hover {
  transform: translateY(-4px) scale(1.04);
  box-shadow: 0 0 60px rgba(0,212,255,0.7), 0 12px 30px rgba(0,0,0,0.5);
}
.btn-ghost {
  background: transparent;
  color: var(--cyan);
  border: 1.5px solid rgba(0,212,255,0.4);
  backdrop-filter: blur(8px);
}
.btn-ghost:hover {
  transform: translateY(-4px) scale(1.04);
  background: rgba(0,212,255,0.08);
  border-color: var(--cyan);
  box-shadow: 0 0 30px rgba(0,212,255,0.3);
}

/* ── STATS ── */
.hero-stats {
  display: flex;
  gap: 28px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid rgba(0,212,255,0.1);
  width: 100%;
  max-width: 500px;
  opacity: 0;
  animation: slideUp 0.8s ease 1.6s forwards;
}
.stat-num {
  font-family: 'Orbitron', monospace;
  font-size: clamp(18px, 3.5vw, 26px);
  font-weight: 900;
  color: var(--cyan);
  display: block;
  line-height: 1;
  margin-bottom: 4px;
  text-shadow: 0 0 20px rgba(0,212,255,0.6);
}
.stat-lbl {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(200,230,255,0.45);
  font-family: 'Orbitron', monospace;
}
.stat-sep {
  width: 1px;
  height: 32px;
  background: rgba(0,212,255,0.12);
  align-self: center;
}

/* ── SCROLL HINT ── */
.scroll-hint {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  opacity: 0;
  animation: slideUp 1s ease 2s forwards;
}
.scroll-hint span {
  font-family: 'Orbitron', monospace;
  font-size: 7px;
  letter-spacing: 3px;
  color: rgba(0,212,255,0.4);
  text-transform: uppercase;
}
.scroll-bar {
  width: 1px;
  height: 32px;
  background: linear-gradient(to bottom, var(--cyan), transparent);
  animation: scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse { 0%,100%{opacity:0.2} 50%{opacity:1} }

/* ── KEYFRAMES ── */
@keyframes logoIn {
  from { opacity:0; transform: scale(0.88) translateY(20px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(26px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── MOBILE ── */
@media(max-width:540px) {
  .logo-img { width: clamp(170px, 70vw, 260px); }
  .hero-headline { font-size: clamp(18px, 7vw, 30px); }
  .btn { padding: 11px 22px; font-size: 9px; }
  .hero-stats { gap: 16px; }
  .stat-sep { display: none; }
}
</style>
</head>

  resize();
  window.addEventListener('resize', resize);

  /* ── PARTICLES ── */
  const particles = [];
  class Particle {
    constructor(){ this.reset(); }
    reset(){
      this.x  = Math.random() * W;
      this.y  = Math.random() * H;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = -(0.1 + Math.random() * 0.5);
      this.r  = 0.5 + Math.random() * 1.5;
      this.alpha = 0;
      this.maxA = 0.3 + Math.random() * 0.5;
      this.life = 0;
      this.maxLife = 120 + Math.random() * 200;
      // bias particles toward center (logo area)
      if(Math.random() > 0.4){
        this.x = W/2 + (Math.random()-0.5) * W * 0.5;
        this.y = H/2 + (Math.random()-0.5) * H * 0.6;
      }
      // colour: mostly cyan, some white, few blue
      const r = Math.random();
      if(r < 0.6)      this.color = '0,212,255';
      else if(r < 0.8) this.color = '180,230,255';
      else             this.color = '0,100,255';
    }
    update(){
      this.life++;
      const p = this.life / this.maxLife;
      this.alpha = p < 0.2 ? (p/0.2)*this.maxA : p > 0.8 ? ((1-p)/0.2)*this.maxA : this.maxA;
      this.x += this.vx;
      this.y += this.vy;
      if(this.life >= this.maxLife) this.reset();
    }
    draw(){
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${this.color},${this.alpha})`;
      ctx.fill();
    }
  }
  for(let i=0;i<140;i++) particles.push(new Particle());

  /* ── ORB BLOBS ── */
  const orbs = [
    { x:0.5, y:0.42, r:0.28, color:'0,180,255',   alpha:0.09, spd:0.007 },
    { x:0.5, y:0.52, r:0.22, color:'0,212,255',   alpha:0.07, spd:0.011 },
    { x:0.35,y:0.45, r:0.18, color:'0,100,220',   alpha:0.06, spd:0.015 },
    { x:0.65,y:0.48, r:0.17, color:'0,212,255',   alpha:0.05, spd:0.013 },
    { x:0.5, y:0.62, r:0.14, color:'0,80,200',    alpha:0.05, spd:0.009 },
  ];

  function drawOrbs(time){
    orbs.forEach((o,i)=>{
      const ox = o.x * W + Math.sin(time * o.spd + i*1.2) * W * 0.05;
      const oy = o.y * H + Math.cos(time * o.spd * 0.7 + i) * H * 0.04;
      const rr = o.r * Math.min(W, H);
      const g = ctx.createRadialGradient(ox, oy, 0, ox, oy, rr);
      g.addColorStop(0,   `rgba(${o.color},${o.alpha})`);
      g.addColorStop(0.4, `rgba(${o.color},${o.alpha*0.5})`);
      g.addColorStop(1,   `rgba(${o.color},0)`);
      ctx.beginPath();
      ctx.arc(ox, oy, rr, 0, Math.PI*2);
      ctx.fillStyle = g;
      ctx.fill();
    });
  }

  /* ── RING PULSES ── */
  const rings = [];
  function spawnRing(){
    rings.push({ x: W/2, y: H*0.43, r: 0, maxR: Math.min(W,H)*0.38, alpha: 0.5, speed: 1.2 });
  }
  let ringTimer = 0;

  function drawRings(){
    for(let i=rings.length-1;i>=0;i--){
      const ring = rings[i];
      ring.r     += ring.speed;
      ring.alpha  = 0.5 * (1 - ring.r / ring.maxR);
      if(ring.alpha <= 0){ rings.splice(i,1); continue; }
      ctx.beginPath();
      ctx.arc(ring.x, ring.y, ring.r, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(0,212,255,${ring.alpha})`;
      ctx.lineWidth   = 1.5;
      ctx.stroke();
    }
  }

  /* ── WAVE LINES AT BOTTOM ── */
  function drawWaves(time){
    const waveConf = [
      { amp:30, freq:0.011, spd:0.022, yf:0.72, a:0.12, color:'0,212,255' },
      { amp:22, freq:0.017, spd:0.03,  yf:0.76, a:0.08, color:'0,140,255' },
      { amp:18, freq:0.009, spd:0.015, yf:0.80, a:0.06, color:'0,212,255' },
    ];
    waveConf.forEach(w=>{
      ctx.beginPath();
      ctx.moveTo(0, H);
      for(let x=0;x<=W;x+=3){
        const y = w.yf*H + Math.sin(x*w.freq + time*w.spd)*w.amp
                         + Math.sin(x*w.freq*1.5 + time*w.spd*0.6)*w.amp*0.4;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(W,H);
      ctx.closePath();
      const g = ctx.createLinearGradient(0, w.yf*H - w.amp, 0, H);
      g.addColorStop(0, `rgba(${w.color},${w.a})`);
      g.addColorStop(1, `rgba(${w.color},0)`);
      ctx.fillStyle = g;
      ctx.fill();

      // glowing crest line
      ctx.beginPath();
      for(let x=0;x<=W;x+=3){
        const y = w.yf*H + Math.sin(x*w.freq + time*w.spd)*w.amp
                         + Math.sin(x*w.freq*1.5 + time*w.spd*0.6)*w.amp*0.4;
        x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      const lg = ctx.createLinearGradient(0,0,W,0);
      lg.addColorStop(0,'transparent');
      lg.addColorStop(0.3,`rgba(${w.color},${w.a*1.5})`);
      lg.addColorStop(0.7,`rgba(${w.color},${w.a*1.5})`);
      lg.addColorStop(1,'transparent');
      ctx.strokeStyle = lg;
      ctx.lineWidth = 1;
      ctx.stroke();
    });
  }

  /* ── SCANLINE GRID ── */
  function drawGrid(){
    ctx.strokeStyle = 'rgba(0,180,255,0.018)';
    ctx.lineWidth   = 1;
    const cs = 55;
    for(let x=0;x<W;x+=cs){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
    for(let y=0;y<H;y+=cs){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  }

  /* ── MAIN LOOP ── */
  function frame(){
    // Background
    ctx.fillStyle = '#000005';
    ctx.fillRect(0,0,W,H);

    drawGrid();
    drawOrbs(t);
    drawWaves(t);
    drawRings();
    particles.forEach(p=>{ p.update(); p.draw(); });

    ringTimer++;
    if(ringTimer % 90 === 0) spawnRing();

    t++;
    requestAnimationFrame(frame);
  }

  // Kick off first ring at load
  setTimeout(()=>spawnRing(), 800);
  frame();

  /* ── MOUSE PARALLAX on logo ── */
  const logo = document.getElementById('logo');
  document.addEventListener('mousemove', function(e){
    const cx = (e.clientX / window.innerWidth  - 0.5) * 18;
    const cy = (e.clientY / window.innerHeight - 0.5) * 12;
    logo.style.transform = `translate(${cx}px, ${cy}px)`;
    orbs[0].x = 0.5 + (e.clientX/window.innerWidth  - 0.5) * 0.1;
    orbs[0].y = 0.42+ (e.clientY/window.innerHeight - 0.5) * 0.08;
  });
  document.addEventListener('mouseleave', function(){
    logo.style.transform = '';
  });
})();
</script>
</body>
</html>
